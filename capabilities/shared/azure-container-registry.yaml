naftiko: "1.0.0-alpha1"

info:
  label: "Azure Container Registry"
  description: "Azure Container Registry REST API for Azure resource management."
  tags:
    - Azure
    - Cloud
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AZURE_SUBSCRIPTION_ID: AZURE_SUBSCRIPTION_ID
      AZURE_ACCESS_TOKEN: AZURE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: azure-container-registry
      baseUri: https://management.azure.com
      description: "Azure Container Registry REST API"
      authentication:
        type: bearer
        token: "{{AZURE_ACCESS_TOKEN}}"
      resources:
        - name: registry
          path: /subscriptions/{subscriptionId}/providers/Microsoft.Registry/Registrys
          description: "Manage Registry resources"
          operations:
            - name: list-registrys
              method: GET
              description: "List all Registry resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: replication
          path: /subscriptions/{subscriptionId}/providers/Microsoft.Replication/Replications
          description: "Manage Replication resources"
          operations:
            - name: list-replications
              method: GET
              description: "List all Replication resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: webhook
          path: /subscriptions/{subscriptionId}/providers/Microsoft.Webhook/Webhooks
          description: "Manage Webhook resources"
          operations:
            - name: list-webhooks
              method: GET
              description: "List all Webhook resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: task
          path: /subscriptions/{subscriptionId}/providers/Microsoft.Task/Tasks
          description: "Manage Task resources"
          operations:
            - name: list-tasks
              method: GET
              description: "List all Task resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8189
      namespace: azure-container-registry-api
      resources:
        - path: /v1/resources
          name: resources
          description: "Resource management"
          operations:
            - method: GET
              name: list-resources
              description: "List resources"
              call: "azure-container-registry.list-registrys"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9189
      namespace: azure-container-registry-mcp
      transport: http
      tools:
        - name: list-registrys
          description: "List Registry resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-registry.list-registrys"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-replications
          description: "List Replication resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-registry.list-replications"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-webhooks
          description: "List Webhook resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-registry.list-webhooks"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tasks
          description: "List Task resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-registry.list-tasks"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
