naftiko: "1.0.0-alpha1"

info:
  label: "Azure Container Registry Management"
  description: "Workflow capability for managing Azure Container Registry resources. Used by cloud engineers and DevOps teams."
  tags:
    - Azure
    - Cloud
    - Management
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AZURE_SUBSCRIPTION_ID: AZURE_SUBSCRIPTION_ID
      AZURE_ACCESS_TOKEN: AZURE_ACCESS_TOKEN

capability:
  consumes:
    - import: azure-container-registry
      location: ./shared/azure-container-registry.yaml

  exposes:
    - type: rest
      port: 8089
      namespace: azure-container-registry-management-api
      description: "Unified REST API for Azure Container Registry management."
      resources:
        - path: /v1/resources
          name: resources
          description: "Resource management"
          operations:
            - method: GET
              name: list
              description: "List all resources"
              call: "azure-container-registry.list-registrys"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9099
      namespace: azure-container-registry-management-mcp
      transport: http
      description: "MCP server for AI-assisted Azure Container Registry management."
      tools:
        - name: list-registrys
          description: "List Registry resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-registry.list-registrys"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-replications
          description: "List Replication resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-registry.list-replications"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-webhooks
          description: "List Webhook resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-registry.list-webhooks"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tasks
          description: "List Task resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-registry.list-tasks"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
